    <style>
      :root {
        --ink: #1c1a17;
        --ink-soft: #5a5650;
        --ink-faint: #a39d96;
        --hairline: rgba(28, 26, 23, 0.1);
        --hairline-strong: rgba(28, 26, 23, 0.22);
        --surface: #fcfaf5;
        --surface-elev: #ffffff;
        --bg-tan: #c7b89a;
        --serif: "Source Serif 4", "Source Serif Pro", Georgia,
          "Times New Roman", serif;
        --mono: ui-monospace, "SF Mono", "Menlo", monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        background: var(--bg-tan);
        overflow: hidden;
        font-family: var(--serif);
        font-size: 13px;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #splat-mount,
      .splat-section,
      .splat-section > canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .splat-section > canvas {
        touch-action: none;
      }

      /* ── Floating chrome buttons (top-left) ────────────────────── */

      #home-link {
        position: fixed;
        top: 16px;
        left: 16px;
        font-size: 13px;
        color: var(--ink);
        text-decoration: none;
        opacity: 0.55;
        z-index: 9999;
      }
      #home-link:hover {
        opacity: 0.9;
      }

      #reopen-picker {
        position: fixed;
        top: 16px;
        left: 86px;
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--hairline-strong);
        font-family: var(--serif);
        font-size: 12px;
        padding: 5px 11px;
        border-radius: 3px;
        cursor: pointer;
        z-index: 9999;
      }
      #reopen-picker:hover {
        background: var(--surface-elev);
      }

      /* ── Settings panel ────────────────────────────────────────── */

      #debug-panel {
        display: none;
        position: fixed;
        z-index: 9999;
        background: var(--surface);
        color: var(--ink);
        font-family: var(--serif);
        font-size: 13px;
        line-height: 1.4;
        top: 16px;
        right: 16px;
        width: 360px;
        max-height: calc(100vh - 32px);
        border-radius: 4px;
        box-shadow:
          0 0 0 1px var(--hairline),
          0 18px 50px -20px rgba(28, 26, 23, 0.28);
        flex-direction: column;
        overflow: hidden;
      }
      #debug-panel.visible {
        display: flex;
      }

      #debug-handle {
        display: none;
      }

      .panel-wordmark {
        padding: 14px 18px 4px;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: -0.005em;
        color: var(--ink);
      }

      .panel-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 0 18px;
        border-bottom: 1px solid var(--hairline);
      }
      .panel-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .panel-action {
        background: transparent;
        border: 1px solid var(--hairline-strong);
        color: var(--ink);
        font-family: var(--serif);
        font-size: 12px;
        padding: 5px 9px;
        border-radius: 3px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition:
          background-color 0.12s ease,
          border-color 0.12s ease;
        line-height: 1;
      }
      .panel-action:hover {
        background: rgba(28, 26, 23, 0.05);
        border-color: var(--ink);
      }
      .panel-action:active {
        background: rgba(28, 26, 23, 0.1);
      }
      .panel-action-icon {
        font-size: 13px;
      }

      .panel-tabs {
        display: flex;
        gap: 20px;
        min-width: 0;
      }
      .tab {
        background: none;
        border: none;
        font-family: var(--serif);
        font-size: 13.5px;
        font-weight: 400;
        color: var(--ink-soft);
        padding: 10px 0 9px;
        cursor: pointer;
        position: relative;
        outline: none;
      }
      .tab:focus-visible {
        outline: 1px solid var(--ink);
        outline-offset: 2px;
      }
      .tab:hover {
        color: var(--ink);
      }
      .tab.active {
        color: var(--ink);
        font-weight: 500;
      }
      .tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 1.5px;
        background: var(--ink);
      }

      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 2px 18px 16px;
        -webkit-overflow-scrolling: touch;
      }
      .panel-section[hidden] {
        display: none;
      }

      .control-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--hairline);
        min-height: 38px;
      }
      .control-row:last-child {
        border-bottom: 0;
      }
      .control-label {
        flex: 1;
        font-size: 13px;
        color: var(--ink);
      }

      .control-header {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--ink-faint);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 16px 0 6px;
        margin-top: 6px;
        border-top: 1px solid var(--hairline);
      }

      /* Sliders */
      .control-range {
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
        width: 130px;
        height: 16px;
        margin: 0;
        cursor: pointer;
        flex-shrink: 0;
      }
      .control-range::-webkit-slider-runnable-track {
        height: 1px;
        background: var(--hairline-strong);
        border-radius: 1px;
      }
      .control-range::-moz-range-track {
        height: 1px;
        background: var(--hairline-strong);
        border-radius: 1px;
      }
      .control-range::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        background: var(--ink);
        border-radius: 50%;
        border: 0;
        margin-top: -5.5px;
        cursor: pointer;
      }
      .control-range::-moz-range-thumb {
        width: 12px;
        height: 12px;
        background: var(--ink);
        border-radius: 50%;
        border: 0;
        cursor: pointer;
      }
      .control-range:focus {
        outline: none;
      }

      /* Numeric readout */
      .control-num {
        width: 50px;
        background: transparent;
        color: var(--ink);
        border: 0;
        border-bottom: 1px solid var(--hairline);
        padding: 2px 2px 2px 0;
        font-family: var(--serif);
        font-size: 12.5px;
        font-variant-numeric: tabular-nums;
        text-align: right;
        outline: none;
        flex-shrink: 0;
      }
      .control-num:focus {
        border-bottom-color: var(--ink);
      }
      .control-num::-webkit-outer-spin-button,
      .control-num::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .control-num[type="number"] {
        -moz-appearance: textfield;
      }

      /* Select */
      .control-selectbox {
        background: transparent;
        border: 1px solid var(--hairline-strong);
        color: var(--ink);
        font-family: var(--serif);
        font-size: 12.5px;
        padding: 4px 22px 4px 8px;
        border-radius: 2px;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='%231c1a17' d='M0 0l5 6 5-6z'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 7px center;
        background-size: 8px;
      }
      .control-selectbox:hover {
        border-color: var(--ink);
      }
      .control-selectbox:focus {
        outline: none;
        border-color: var(--ink);
      }

      /* Checkbox */
      .control-checkbox {
        cursor: pointer;
      }
      .control-check {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border: 1px solid var(--hairline-strong);
        border-radius: 2px;
        background: var(--surface-elev);
        cursor: pointer;
        position: relative;
        margin: 0;
        flex-shrink: 0;
        transition:
          background-color 0.1s ease,
          border-color 0.1s ease;
      }
      .control-check:hover {
        border-color: var(--ink);
      }
      .control-check:checked {
        background: var(--ink);
        border-color: var(--ink);
      }
      .control-check:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 4px;
        height: 8px;
        border: solid var(--surface);
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(45deg);
      }

      /* Color picker */
      .control-colorbox {
        width: 30px;
        height: 20px;
        border: 1px solid var(--hairline-strong);
        border-radius: 2px;
        padding: 0;
        cursor: pointer;
        background: var(--surface-elev);
      }
      .control-colorbox::-webkit-color-swatch-wrapper {
        padding: 2px;
      }
      .control-colorbox::-webkit-color-swatch {
        border: 0;
        border-radius: 1px;
      }

      /* Button */
      .control-button {
        background: var(--ink);
        color: var(--surface);
        border: 1px solid var(--ink);
        font-family: var(--serif);
        font-size: 12.5px;
        padding: 8px 12px;
        border-radius: 3px;
        cursor: pointer;
        width: 100%;
        margin-top: 12px;
      }
      .control-button.subtle {
        background: transparent;
        color: var(--ink);
      }
      .control-button:hover {
        opacity: 0.85;
      }

      /* Toast — global flash */
      #debug-toast {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translate(-50%, 8px);
        background: var(--ink);
        color: var(--surface);
        font-family: var(--serif);
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 3px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.16s ease,
          transform 0.16s ease;
        z-index: 2;
      }
      #debug-toast.visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      /* Telemetry log — dev-only (?debug) */
      #debug-log {
        border-top: 1px solid var(--hairline);
        padding: 10px 18px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-soft);
        line-height: 1.55;
        max-height: 140px;
        overflow-y: auto;
      }
      .log-key {
        color: var(--ink-faint);
      }

      /* ── Mobile bottom sheet ───────────────────────────────────── */

      @media (max-width: 768px) {
        #debug-panel {
          top: auto;
          bottom: 0;
          left: 0;
          right: 0;
          width: 100%;
          height: 35vh;
          max-height: 35vh;
          border-radius: 14px 14px 0 0;
          transform: translateY(calc(35vh - 32px));
          transition: transform 0.22s ease-out;
          box-shadow: 0 -2px 28px -8px rgba(28, 26, 23, 0.28);
        }
        #debug-panel.drawer-open {
          transform: translateY(0);
        }

        #debug-handle {
          display: block;
          width: 100%;
          background: var(--surface);
          border: 0;
          padding: 0;
          cursor: pointer;
          position: relative;
          height: 32px;
          flex-shrink: 0;
        }
        #debug-handle::after {
          content: "";
          position: absolute;
          top: 13px;
          left: 50%;
          transform: translateX(-50%);
          width: 38px;
          height: 3px;
          background: var(--hairline-strong);
          border-radius: 2px;
          transition: background-color 0.15s ease;
        }
        #debug-handle:active::after {
          background: var(--ink);
        }

        /* Hide wordmark; the bar (tabs + actions) is the visual header */
        .panel-wordmark {
          display: none;
        }

        .panel-bar {
          padding: 0 14px;
          gap: 10px;
        }
        .panel-tabs {
          gap: 14px;
        }
        .tab {
          font-size: 13px;
          white-space: nowrap;
          padding: 13px 0 12px;
        }
        .panel-actions {
          gap: 4px;
        }

        .panel-body {
          padding: 4px 14px calc(36px + env(safe-area-inset-bottom, 0));
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
        .panel-body::-webkit-scrollbar {
          display: none;
        }
        /* Soft top fade so scrolled-up content slips under the tab bar
           instead of clipping against a hard edge. */
        .panel-body::before {
          content: "";
          position: sticky;
          top: 0;
          display: block;
          height: 10px;
          margin: 0 -14px -10px;
          background: linear-gradient(
            to bottom,
            var(--surface) 0%,
            rgba(252, 250, 245, 0) 100%
          );
          pointer-events: none;
          z-index: 1;
        }
        .control-row {
          padding: 13px 0;
          min-height: 44px;
        }
        /* Taller hit zone for fingers — the range input registers taps
           anywhere inside its box, not just on the visible track. */
        .control-range {
          height: 32px;
          /* Claim horizontal drags so the scrollable panel doesn't
             steal them as vertical scrolls. */
          touch-action: pan-x;
        }
        .control-range::-webkit-slider-runnable-track {
          height: 2px;
        }
        .control-range::-moz-range-track {
          height: 2px;
        }
        /* Bigger thumb on touch — fingers aren't cursors. iOS native
           sliders use ~28px; we go ~22 for a slightly more restrained
           feel that still gives a real target. */
        .control-range::-webkit-slider-thumb {
          width: 22px;
          height: 22px;
          margin-top: -10px;
        }
        .control-range::-moz-range-thumb {
          width: 22px;
          height: 22px;
        }

        #home-link {
          top: 12px;
          left: 12px;
        }
        #reopen-picker {
          top: 12px;
          left: 78px;
          padding: 4px 9px;
          font-size: 11px;
        }
      }

      /* ── Picker overlay ─────────────────────────────────────────── */

      #picker {
        position: fixed;
        inset: 0;
        background: rgba(28, 26, 23, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }
      .picker-card {
        background: var(--surface);
        color: var(--ink);
        padding: 32px 32px 24px;
        border-radius: 6px;
        max-width: 420px;
        width: 90vw;
        font-family: var(--serif);
        box-shadow: 0 24px 60px -20px rgba(28, 26, 23, 0.4);
      }
      .picker-card h1 {
        margin: 0 0 4px 0;
        font-weight: 500;
        font-size: 24px;
        letter-spacing: -0.01em;
      }
      .picker-card p.tagline {
        margin: 0 0 22px 0;
        color: var(--ink-soft);
        font-size: 12.5px;
        line-height: 1.5;
      }
      .picker-card .demos {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .picker-card button[data-demo-index] {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--hairline-strong);
        padding: 11px 14px;
        border-radius: 3px;
        cursor: pointer;
        text-align: left;
        font-family: var(--serif);
        font-size: 13.5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        transition:
          background-color 0.12s ease,
          border-color 0.12s ease;
      }
      .picker-card button[data-demo-index]:hover {
        background: rgba(28, 26, 23, 0.04);
        border-color: var(--ink);
      }
      .picker-card .meta {
        color: var(--ink-faint);
        font-size: 11.5px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }
      .picker-card .meta.warn {
        color: var(--ink-soft);
      }
      .picker-card .divider {
        text-align: center;
        color: var(--ink-faint);
        margin: 18px 0;
        font-size: 10.5px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 500;
      }
      .picker-card .file-pick {
        display: block;
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--hairline-strong);
        padding: 11px 14px;
        border-radius: 3px;
        cursor: pointer;
        text-align: center;
        font-size: 13.5px;
        transition:
          background-color 0.12s ease,
          border-color 0.12s ease;
      }
      .picker-card .file-pick:hover {
        background: rgba(28, 26, 23, 0.04);
        border-color: var(--ink);
      }
      .picker-card .file-pick input {
        display: none;
      }
      .picker-card .dnd-hint {
        text-align: center;
        color: var(--ink-faint);
        margin-top: 10px;
        font-size: 12px;
      }
      .picker-card .cancel {
        margin-top: 22px;
        background: transparent;
        color: var(--ink-soft);
        border: none;
        font-family: var(--serif);
        font-size: 12.5px;
        cursor: pointer;
        width: 100%;
        padding: 8px;
      }
      .picker-card .cancel:hover {
        color: var(--ink);
      }

      /* ── Progress bar ──────────────────────────────────────────── */

      #progress-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: rgba(28, 26, 23, 0.08);
        z-index: 10001;
        pointer-events: none;
      }
      #progress-bar .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--ink);
        transition: width 0.15s ease-out;
      }
      #progress-label {
        position: fixed;
        bottom: 12px;
        right: 12px;
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--hairline-strong);
        font-family: var(--serif);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 3px;
        z-index: 10001;
        pointer-events: none;
      }

      /* ── Vanilla-mode badge ─────────────────────────────────────── */

      #vanilla-badge {
        display: none;
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--hairline-strong);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 3px;
        z-index: 9999;
        pointer-events: none;
      }
      body.vanilla #vanilla-badge {
        display: block;
      }

      /* ── Drag-drop overlay ──────────────────────────────────────── */

      body.dragging::after {
        content: "drop a .ply to load";
        position: fixed;
        inset: 0;
        background: rgba(252, 250, 245, 0.7);
        color: var(--ink);
        font-size: 22px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10001;
        pointer-events: none;
        letter-spacing: -0.005em;
      }
    </style>

      {
        "imports": {
          "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0/spark.module.js"
        }
      }
    </script>
  </head>
  <body data-debug>
    <a id="home-link" href="/">← home</a>
    <button id="reopen-picker" type="button" hidden>↻ swap splat</button>
    <div id="vanilla-badge">vanilla · pure spark default</div>
    <div id="splat-mount"></div>

    <div id="debug-panel">
      <button
        id="debug-handle"
        type="button"
        aria-expanded="false"
        aria-label="Toggle settings"
      ></button>
      <div class="panel-wordmark">splat explorer</div>
      <div class="panel-bar">
        <div id="debug-tabs" class="panel-tabs" role="tablist"></div>
        <div id="debug-actions" class="panel-actions"></div>
      </div>
      <div id="debug-body" class="panel-body"></div>
      <div id="debug-toast"></div>
      <div id="debug-log"></div>
    </div>

    <div id="progress-bar" hidden>
      <div class="progress-fill"></div>
    </div>
    <div id="progress-label" hidden></div>

    <div id="picker">
      <div class="picker-card">
        <h1>splat explorer</h1>
        <p class="tagline">
          load a demo or drop in your own gaussian splat .ply
        </p>

        <div class="demos" id="demo-buttons"></div>

        <div class="divider">— or —</div>

        <label class="file-pick">
          Load your own .ply
          <input id="file-input" type="file" accept=".ply" />
        </label>
        <div class="dnd-hint">or drop a .ply anywhere on the page</div>

        <button id="cancel-picker" class="cancel" type="button" hidden>
          cancel
        </button>
      </div>
    </div>

    <script type="module" src="./splat.js"></script>
  </body>
</html>
